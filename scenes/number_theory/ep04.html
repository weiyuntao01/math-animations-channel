<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EP04 - Ulam Spiral: Prime Startrail</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: radial-gradient(circle at 20% 20%, #09081a 0%, #09061e 40%, #0d0c28 100%);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #eef7ff;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .info-container {
            position: fixed;
            top: 36px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
            color: white;
            text-shadow: 0 0 18px rgba(140, 205, 255, 0.45);
        }

        .title {
            font-size: 2.6em;
            font-weight: bold;
            margin-bottom: 10px;
            background: linear-gradient(60deg, #00f6ff, #a96bff, #ffe970);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: hueShift 4s ease-in-out infinite alternate;
        }

        .subtitle {
            font-size: 1.1em;
            color: #8fd3ff;
            margin-bottom: 18px;
        }

        .stats {
            display: flex;
            gap: 28px;
            justify-content: center;
            font-size: 0.95em;
            color: #cadbff;
        }

        .stat-item {
            background: rgba(20, 26, 60, 0.55);
            padding: 12px 18px;
            border-radius: 12px;
            border: 1px solid rgba(120, 160, 255, 0.25);
            backdrop-filter: blur(12px);
        }

        .stat-label {
            font-size: 0.82em;
            color: #9fc9ff;
        }

        .stat-value {
            font-size: 1.45em;
            font-weight: 600;
            color: #58f5ff;
        }

        .note {
            margin-top: 14px;
            font-size: 0.95em;
            color: #ffe7ff;
        }

        .quote {
            position: absolute;
            left: 50%;
            bottom: 68px;
            transform: translateX(-50%);
            max-width: 84vw;
            white-space: nowrap;
            overflow: hidden;
            color: rgba(255, 255, 255, 0.98);
            font-size: 36px;
            font-weight: 500;
            line-height: 1.6;
            letter-spacing: 0.5px;
            -webkit-text-stroke: 0.45px rgba(110, 60, 255, 0.35);
            text-shadow:
                0 0 3px rgba(120, 120, 255, 0.6),
                0 0 18px rgba(150, 90, 255, 0.45),
                0 2px 12px rgba(0, 0, 0, 0.75);
            text-align: center;
            user-select: none;
            pointer-events: none;
            z-index: 9999;
            padding: 0 40px;
            transition: opacity 1.4s ease;
        }

        @keyframes hueShift {
            0% {
                filter: hue-rotate(0deg);
            }

            100% {
                filter: hue-rotate(25deg);
            }
        }
    </style>
</head>

<body>
    <canvas id="canvas"></canvas>

    <div class="info-container">
        <div class="title">Ulam Spiral: Prime Startrail</div>
        <div class="subtitle" id="rangeInfo">The walk begins at 1 and unwinds along a square spiral.</div>
        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">Numbers Plotted</div>
                <div class="stat-value" id="numbersDrawn">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Prime Count</div>
                <div class="stat-value" id="primeCount">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Diagonal Prime Ratio</div>
                <div class="stat-value" id="diagonalRatio">0%</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Longest Startrail</div>
                <div class="stat-value" id="longestStreak">0</div>
            </div>
        </div>
        <div class="note" id="insightText">Watch the diagonals: brighter streaks mean prime clusters.</div>
    </div>

    <div class="quote"></div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        const stats = {
            rangeInfo: document.getElementById('rangeInfo'),
            numbersDrawn: document.getElementById('numbersDrawn'),
            primeCount: document.getElementById('primeCount'),
            diagonalRatio: document.getElementById('diagonalRatio'),
            longestStreak: document.getElementById('longestStreak'),
            insight: document.getElementById('insightText')
        };

        const quoteDiv = document.querySelector('.quote');
        const subtitles = [
            'Lay the integers along a square spiral: this is the Ulam spiral.',
            'Only primes light up, so any streak of light reveals a hidden pattern.',
            'When primes line up on a diagonal, the trail flashes like neon.',
            'Longer trails mean several primes in a row—rare, but glorious.',
            'Prime clusters aren’t random noise; the spiral helps us see their rhythm.',
            'Hover any point to inspect it, and drop discoveries in the comments!'
        ];
        let subtitleIndex = 0;

        const plane = {
            scale: 1,
            centerX: 0,
            centerY: 0
        };

        const scanWave = {
            radius: 0,
            speed: 20,
            maxRadius: 0
        };

        const directions = [
            { dx: 1, dy: 0 },
            { dx: 0, dy: 1 },
            { dx: -1, dy: 0 },
            { dx: 0, dy: -1 }
        ];

        const points = [];
        const primeIndices = [];
        const particles = [];
        const shockwaves = [];
        const diagonalLights = [];
        const primeConnections = [];

        let spiralX = 0;
        let spiralY = 0;
        let directionIndex = 0;
        let stepsInLeg = 0;
        let legLength = 1;
        let legsCompleted = 0;

        const maxNumbers = 2400;
        let numbersDrawn = 0;
        let primesDrawn = 0;
        let diagonalPrimeCount = 0;
        let longestDiagonalStreak = 0;
        let currentDiagonalStreak = 0;

        let spawnRatePerSecond = 24;
        const spawnAcceleration = 18;
        let spawnAccumulator = 0;

        let hoverPoint = null;
        let lastTime = performance.now();

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            updatePlane();
            fitSubtitleToOneLine();
        }

        function updatePlane() {
            const padding = Math.min(canvas.width, canvas.height) * 0.15;
            const usableSize = Math.min(canvas.width, canvas.height) - padding * 2;
            const gridRadius = Math.ceil(Math.sqrt(maxNumbers));
            plane.scale = usableSize / (gridRadius * 2);
            plane.centerX = canvas.width / 2;
            plane.centerY = canvas.height / 2;
            scanWave.maxRadius = Math.sqrt(maxNumbers) * plane.scale;
            scanWave.radius = Math.min(scanWave.radius, scanWave.maxRadius);
        }

        function mapPoint(x, y) {
            return {
                x: plane.centerX + x * plane.scale,
                y: plane.centerY - y * plane.scale
            };
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function isPrime(n) {
            if (n < 2) return false;
            if (n === 2) return true;
            if (n % 2 === 0) return false;
            const limit = Math.sqrt(n);
            for (let i = 3; i <= limit; i += 2) {
                if (n % i === 0) return false;
            }
            return true;
        }

        function generateNextPoint() {
            const n = points.length + 1;
            if (n === 1) {
                const point = {
                    n,
                    x: 0,
                    y: 0,
                    screenX: plane.centerX,
                    screenY: plane.centerY,
                    isPrime: false,
                    isDiagonal: true,
                    theta: 0,
                    radius: 0
                };
                points.push(point);
                numbersDrawn = 1;
                return;
            }

            const dir = directions[directionIndex];
            spiralX += dir.dx;
            spiralY += dir.dy;
            stepsInLeg += 1;

            if (stepsInLeg === legLength) {
                directionIndex = (directionIndex + 1) % 4;
                stepsInLeg = 0;
                legsCompleted += 1;
                if (legsCompleted % 2 === 0) {
                    legLength += 1;
                }
            }

            const diagonal = Math.abs(spiralX) === Math.abs(spiralY);
            const prime = isPrime(n);
            const mapped = mapPoint(spiralX, spiralY);
            const point = {
                n,
                x: spiralX,
                y: spiralY,
                screenX: mapped.x,
                screenY: mapped.y,
                isPrime: prime,
                isDiagonal: diagonal,
                theta: Math.atan2(spiralY, spiralX),
                radius: Math.sqrt(spiralX * spiralX + spiralY * spiralY)
            };

            points.push(point);
            numbersDrawn = n;

            if (prime) {
                primesDrawn += 1;
                primeIndices.push(points.length - 1);
                if (diagonal) {
                    diagonalPrimeCount += 1;
                    currentDiagonalStreak += 1;
                    if (currentDiagonalStreak > longestDiagonalStreak) {
                        longestDiagonalStreak = currentDiagonalStreak;
                    }
                    diagonalLights.push({ x: mapped.x, y: mapped.y, life: 0, duration: 1.8 });
                } else {
                    currentDiagonalStreak = 0;
                }
                spawnPrimeEffects(point);
            } else if (diagonal) {
                currentDiagonalStreak = 0;
            }
        }

        function spawnPrimeEffects(point) {
            const { screenX: x, screenY: y } = point;

            for (let i = 0; i < 28; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 140 + Math.random() * 160;
                particles.push({
                    x,
                    y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 0,
                    duration: 0.75 + Math.random() * 0.6,
                    hue: 180 + Math.random() * 100
                });
            }

            shockwaves.push({ x, y, life: 0, duration: 1.15 });

            const previousPrimeIndex = primeIndices.length >= 2 ? primeIndices[primeIndices.length - 2] : null;
            primeConnections.push({
                fromIndex: previousPrimeIndex,
                toIndex: primeIndices[primeIndices.length - 1],
                life: 0,
                duration: 3.6
            });
        }

        function drawBackground(time) {
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, 'rgba(12, 10, 35, 0.92)');
            gradient.addColorStop(1, 'rgba(22, 10, 45, 0.88)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const nebula = ctx.createRadialGradient(
                canvas.width * 0.65,
                canvas.height * 0.35,
                40,
                canvas.width * 0.55,
                canvas.height * 0.4,
                Math.max(canvas.width, canvas.height) * 0.7
            );
            const hueShift = Math.sin(time * 0.00025) * 40;
            nebula.addColorStop(0, 'rgba(30, 40, 120, 0.45)');
            nebula.addColorStop(0.55, `rgba(${80 + hueShift}, 140, 200, 0.25)`);
            nebula.addColorStop(1, 'rgba(10, 15, 35, 0.65)');
            ctx.fillStyle = nebula;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawLatticePulseGrid(time) {
            ctx.save();
            ctx.globalCompositeOperation = 'screen';
            const pulse = Math.sin(time * 0.001) * 0.5 + 0.5;
            ctx.strokeStyle = `rgba(110, 150, 255, ${0.09 + pulse * 0.15})`;
            ctx.lineWidth = 1;

            const step = plane.scale;
            const maxExtent = plane.scale * Math.ceil(Math.sqrt(maxNumbers));

            ctx.beginPath();
            for (let i = -maxExtent; i <= maxExtent; i += step * 3) {
                ctx.moveTo(plane.centerX + i, plane.centerY - maxExtent);
                ctx.lineTo(plane.centerX + i, plane.centerY + maxExtent);
                ctx.moveTo(plane.centerX - maxExtent, plane.centerY + i);
                ctx.lineTo(plane.centerX + maxExtent, plane.centerY + i);
            }
            ctx.stroke();
            ctx.restore();
        }

        function drawNumberSpiralCollider(time) {
            ctx.save();
            ctx.translate(plane.centerX, plane.centerY);
            ctx.globalCompositeOperation = 'lighter';

            const angle = Math.atan(Math.SQRT2);
            const maxRadius = Math.sqrt(maxNumbers) * plane.scale * 0.9;
            const sweep = (Math.sin(time * 0.0006) * 0.5 + 0.5) * Math.PI * 2;

            ctx.strokeStyle = 'rgba(180, 140, 255, 0.28)';
            ctx.lineWidth = 1.4 + Math.sin(time * 0.001) * 0.6;
            ctx.beginPath();
            ctx.arc(0, 0, maxRadius, 0, sweep);
            ctx.stroke();

            for (let k = -1; k <= 1; k++) {
                const offset = 0.05 * k + Math.sin(time * 0.0009 + k) * 0.02;
                const lineAngle = angle + offset;
                ctx.strokeStyle = `rgba(120, 220, 255, ${0.18 + 0.12 * Math.sin(time * 0.0012 + k)})`;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(Math.cos(lineAngle) * maxRadius, -Math.sin(lineAngle) * maxRadius);
                ctx.stroke();
            }

            ctx.restore();
        }

        function updateParticles(dt) {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.life += dt;
                if (p.life >= p.duration) {
                    particles.splice(i, 1);
                    continue;
                }
                p.vx *= 0.98;
                p.vy *= 0.98;
                p.x += p.vx * dt;
                p.y += p.vy * dt;
            }
        }

        function renderParticles() {
            ctx.save();
            particles.forEach(p => {
                const alpha = Math.max(0, 1 - p.life / p.duration);
                ctx.fillStyle = `hsla(${p.hue}, 95%, 70%, ${alpha})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2.1 + (1 - alpha) * 1.8, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.restore();
        }

        function updateShockwaves(dt) {
            for (let i = shockwaves.length - 1; i >= 0; i--) {
                const s = shockwaves[i];
                s.life += dt;
                if (s.life >= s.duration) {
                    shockwaves.splice(i, 1);
                }
            }
        }

        function renderShockwaves() {
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            shockwaves.forEach(s => {
                const progress = s.life / s.duration;
                const radius = 18 + progress * 160;
                const alpha = Math.max(0, 0.32 * (1 - progress));
                ctx.strokeStyle = `rgba(90, 220, 255, ${alpha})`;
                ctx.lineWidth = 1.8;
                ctx.beginPath();
                ctx.arc(s.x, s.y, radius, 0, Math.PI * 2);
                ctx.stroke();
            });
            ctx.restore();
        }

        function updatePrimeConnections(dt) {
            for (let i = primeConnections.length - 1; i >= 0; i--) {
                const c = primeConnections[i];
                c.life += dt;
                if (c.life >= c.duration) {
                    primeConnections.splice(i, 1);
                }
            }
        }

        function renderPrimeConnections() {
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            primeConnections.forEach(c => {
                if (c.fromIndex === null) return;
                const from = points[c.fromIndex];
                const to = points[c.toIndex];
                const alpha = Math.max(0, 1 - c.life / c.duration);
                const gradient = ctx.createLinearGradient(from.screenX, from.screenY, to.screenX, to.screenY);
                gradient.addColorStop(0, `rgba(255, 200, 120, ${0.28 * alpha})`);
                gradient.addColorStop(0.5, `rgba(110, 220, 255, ${0.6 * alpha})`);
                gradient.addColorStop(1, `rgba(255, 200, 120, ${0.28 * alpha})`);
                ctx.strokeStyle = gradient;
                ctx.lineWidth = 1.6 + alpha * 1.4;
                ctx.beginPath();
                ctx.moveTo(from.screenX, from.screenY);
                ctx.lineTo(to.screenX, to.screenY);
                ctx.stroke();
            });
            ctx.restore();
        }

        function updateDiagonalLights(dt) {
            for (let i = diagonalLights.length - 1; i >= 0; i--) {
                const d = diagonalLights[i];
                d.life += dt;
                if (d.life >= d.duration) {
                    diagonalLights.splice(i, 1);
                }
            }
        }

        function renderDiagonalLights() {
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            diagonalLights.forEach(d => {
                const alpha = Math.max(0, 1 - d.life / d.duration);
                const radius = 12 + alpha * 26;
                const gradient = ctx.createRadialGradient(d.x, d.y, 0, d.x, d.y, radius);
                gradient.addColorStop(0, `rgba(255, 255, 200, ${0.55 * alpha})`);
                gradient.addColorStop(0.6, `rgba(90, 240, 255, ${0.3 * alpha})`);
                gradient.addColorStop(1, 'rgba(20, 40, 80, 0)');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(d.x, d.y, radius, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.restore();
        }

        function updateScanWave(dt) {
            if (scanWave.maxRadius <= 0) return;
            const speedPixels = scanWave.speed * plane.scale * 6;
            scanWave.radius += speedPixels * dt;
            if (scanWave.radius > scanWave.maxRadius) {
                scanWave.radius = 0;
            }
        }

        function renderScanWave() {
            if (scanWave.maxRadius <= 0) return;
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            const inner = Math.max(0, scanWave.radius - plane.scale * 6);
            const outer = scanWave.radius + plane.scale * 10;
            const gradient = ctx.createRadialGradient(
                plane.centerX,
                plane.centerY,
                inner,
                plane.centerX,
                plane.centerY,
                outer
            );
            gradient.addColorStop(0, 'rgba(120, 220, 255, 0)');
            gradient.addColorStop(0.4, 'rgba(120, 220, 255, 0.18)');
            gradient.addColorStop(0.7, 'rgba(255, 200, 140, 0.14)');
            gradient.addColorStop(1, 'rgba(20, 40, 80, 0)');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(plane.centerX, plane.centerY, outer, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function renderPoints(time) {
            ctx.save();
            const glowPulse = Math.sin(time * 0.0012) * 0.5 + 0.5;
            points.slice(0, numbersDrawn).forEach(point => {
                if (!point.isPrime) {
                    const alpha = 0.18 + 0.12 * Math.sin(point.theta * 12 + time * 0.001);
                    ctx.fillStyle = `rgba(40, 60, 110, ${alpha})`;
                    ctx.beginPath();
                    ctx.arc(point.screenX, point.screenY, 2, 0, Math.PI * 2);
                    ctx.fill();
                    return;
                }

                const radius = 4.2 + glowPulse * 1.2;
                ctx.fillStyle = 'rgba(255, 255, 200, 0.95)';
                ctx.beginPath();
                ctx.arc(point.screenX, point.screenY, radius, 0, Math.PI * 2);
                ctx.fill();

                const gradient = ctx.createRadialGradient(
                    point.screenX,
                    point.screenY,
                    0,
                    point.screenX,
                    point.screenY,
                    radius * 3.6
                );
                gradient.addColorStop(0, 'rgba(255, 245, 210, 0.55)');
                gradient.addColorStop(0.6, 'rgba(110, 220, 255, 0.28)');
                gradient.addColorStop(1, 'rgba(20, 40, 80, 0)');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(point.screenX, point.screenY, radius * 3.6, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.restore();
        }

        function renderHoverLabel() {
            if (!hoverPoint) return;
            ctx.save();
            ctx.font = '16px "Segoe UI", "Microsoft YaHei", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            ctx.fillStyle = 'rgba(255, 255, 220, 0.95)';
            ctx.fillText(`n = ${hoverPoint.n}`, hoverPoint.screenX, hoverPoint.screenY - 12);
            ctx.restore();
        }

        function updateStats() {
            if (numbersDrawn === 0) return;
            const diagonalRatio = primesDrawn === 0 ? 0 : (diagonalPrimeCount / primesDrawn * 100);
            stats.numbersDrawn.textContent = numbersDrawn.toLocaleString('en-US');
            stats.primeCount.textContent = primesDrawn.toLocaleString('en-US');
            stats.diagonalRatio.textContent = `${diagonalRatio.toFixed(1)}%`;
            stats.longestStreak.textContent = longestDiagonalStreak.toString();

            const lastPoint = points[numbersDrawn - 1];
            stats.rangeInfo.textContent = `Spiral reached n = ${lastPoint.n.toLocaleString('en-US')} at grid (${lastPoint.x}, ${lastPoint.y}).`;

            if (hoverPoint && hoverPoint.isPrime) {
                stats.insight.textContent = `Prime at n = ${hoverPoint.n}; diagonal brightness indicates a streak length of ${currentDiagonalStreak || 1}.`;
            } else if (diagonalPrimeCount > 0) {
                stats.insight.textContent = `Detected ${diagonalPrimeCount} diagonal primes so far; longest uninterrupted streak is ${longestDiagonalStreak}.`;
            } else {
                stats.insight.textContent = 'No diagonal prime yet—keep watching for the first spark.';
            }
        }

        function fitSubtitleToOneLine() {
            const padding = 80;
            const maxWidth = window.innerWidth - padding;
            const base = window.innerWidth < 768 ? 30 : 36;
            const min = window.innerWidth < 768 ? 24 : 30;
            let size = base;
            quoteDiv.style.fontSize = size + 'px';
            while (quoteDiv.scrollWidth > maxWidth && size > min) {
                size -= 1;
                quoteDiv.style.fontSize = size + 'px';
            }
        }

        function setSubtitleText(text) {
            quoteDiv.style.fontSize = '';
            quoteDiv.textContent = text;
            fitSubtitleToOneLine();
        }

        function fadeIn() {
            requestAnimationFrame(() => { quoteDiv.style.opacity = 1; });
        }

        function fadeOut(callback) {
            quoteDiv.style.opacity = 0;
            setTimeout(callback, 1000);
        }

        quoteDiv.style.opacity = 0;
        setTimeout(() => {
            setSubtitleText(subtitles[subtitleIndex]);
            fadeIn();
        }, 1200);

        function rotateSubtitle() {
            fadeOut(() => {
                subtitleIndex = (subtitleIndex + 1) % subtitles.length;
                setSubtitleText(subtitles[subtitleIndex]);
                fadeIn();
            });
        }

        setInterval(rotateSubtitle, 5000);

        canvas.addEventListener('mousemove', (event) => {
            const rect = canvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;
            hoverPoint = null;
            let minDistance = 14;
            points.slice(0, numbersDrawn).forEach(point => {
                const d = Math.hypot(point.screenX - x, point.screenY - y);
                if (d < minDistance) {
                    hoverPoint = point;
                    minDistance = d;
                }
            });
            canvas.style.cursor = hoverPoint ? 'pointer' : 'default';
        });

        canvas.addEventListener('mouseleave', () => {
            hoverPoint = null;
            canvas.style.cursor = 'default';
        });

        canvas.addEventListener('click', () => {
            if (!hoverPoint) return;
            const message = hoverPoint.isPrime
                ? `Prime found at n = ${hoverPoint.n}\nSpiral coordinate: (${hoverPoint.x}, ${hoverPoint.y}).`
                : `n = ${hoverPoint.n} is composite.\nIt still helps align the prime startrail.`;
            alert(message);
        });

        function animate(time) {
            const dt = Math.min(0.1, (time - lastTime) / 1000);
            lastTime = time;

            if (numbersDrawn < maxNumbers) {
                spawnAccumulator += dt * spawnRatePerSecond;
                while (spawnAccumulator >= 1 && numbersDrawn < maxNumbers) {
                    generateNextPoint();
                    spawnAccumulator -= 1;
                }
                spawnRatePerSecond = Math.min(160, spawnRatePerSecond + spawnAcceleration * dt);
            }

            updateParticles(dt);
            updateShockwaves(dt);
            updatePrimeConnections(dt);
            updateDiagonalLights(dt);
            updateScanWave(dt);

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground(time);
            drawLatticePulseGrid(time);
            drawNumberSpiralCollider(time);
            renderScanWave();
            renderPrimeConnections();
            renderShockwaves();
            renderDiagonalLights();
            renderParticles();
            renderPoints(time);
            renderHoverLabel();
            updateStats();

            requestAnimationFrame(animate);
        }

        animate(performance.now());
    </script>
</body>

</html>
