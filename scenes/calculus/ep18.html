<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lorenz霓虹流：混沌吸引子 · 人生哲理轮播版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000; overflow: hidden; position: relative;
        }
        #canvas { display: block; }
        .title-area {
            position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
            text-align: center; z-index: 100;
        }
        .main-title {
            color: white; font-size: 36px; font-weight: 200; letter-spacing: 3px;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.8); margin-bottom: 10px;
        }
        .formula {
            color: rgba(0, 255, 255, 0.9); font-size: 20px; font-family: 'Courier New', monospace;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.5); line-height: 1.5;
        }
        .stats-bar {
            position: absolute; bottom: 0; left: 0; right: 0; height: 100px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9), transparent);
            display: flex; justify-content: center; align-items: center; gap: 80px; z-index: 100;
        }
        .stat-item { text-align: center; }
        .stat-label { color: rgba(255, 255, 255, 0.6); font-size: 14px; margin-bottom: 8px; letter-spacing: 1px; }
        .stat-value {
            color: #00ffff; font-size: 28px; font-weight: 300; text-shadow: 0 0 15px rgba(0, 255, 255, 0.8);
            font-family: 'Courier New', monospace;
        }
        .wisdom {
            position: absolute; left: 50%; bottom: 120px; transform: translateX(-50%);
            /* 拓宽可用宽度并尽量不换行 */
            max-width: 90vw; white-space: nowrap; overflow: hidden; text-overflow: clip;
            color: rgba(255, 255, 255, 0.98); font-size: 20px; font-weight: 500;
            line-height: 1.6; letter-spacing: 0.6px;
            /* 更粗的“文字线”：描边 + 更强辉光 */
            -webkit-text-stroke: 0.6px rgba(0, 255, 255, 0.35);
            text-shadow:
                0 0 2px rgba(0, 255, 255, 0.6),
                0 0 10px rgba(0, 255, 255, 0.35),
                0 2px 10px rgba(0, 0, 0, 0.8);
            text-align: center; user-select: none; pointer-events: none; z-index: 9999; padding: 0 40px;
            transition: opacity 1.5s ease;
        }
        @media (max-width: 768px) {
            .main-title { font-size: 28px; }
            .formula { font-size: 16px; }
            .stats-bar { gap: 40px; height: 80px; }
            .stat-value { font-size: 22px; }
            .wisdom { font-size: 16px; bottom: 100px; }
        }
    </style>
</head>

<body>
    <canvas id="canvas"></canvas>

    <div class="title-area">
        <div class="main-title">洛伦兹吸引子</div>
        <div class="formula">
            dx/dt = σ(y - x)<br>
            dy/dt = x(ρ - z) - y<br>
            dz/dt = xy - βz
        </div>
    </div>

    <div class="stats-bar">
        <div class="stat-item">
            <div class="stat-label">σ 参数</div>
            <div class="stat-value">10.0</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">ρ 参数</div>
            <div class="stat-value">28.0</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">β 参数</div>
            <div class="stat-value">2.67</div>
        </div>
    </div>

    <div class="wisdom"></div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resizeCanvas(); window.addEventListener('resize', resizeCanvas);

        let animationTime = 0;
        // Lorenz系统参数
        const sigma = 10.0; const rho = 28.0; const beta = 8.0 / 3.0; const dt = 0.01;
        // 初始点
        let x = 0.1, y = 0, z = 0;
        // 轨迹点
        const trail = []; const maxTrailLength = 3500;

        // Lorenz方程
        function lorenzStep() {
            const dx = sigma * (y - x) * dt;
            const dy = (x * (rho - z) - y) * dt;
            const dz = (x * y - beta * z) * dt;
            x += dx; y += dy; z += dz; return { x, y, z };
        }

        function drawBackground() { ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height); }

        // 3D到2D投影
        function project3D(x, y, z) {
            const scale = 8; const centerX = canvas.width / 2; const centerY = canvas.height / 2;
            const rotateY = animationTime * 0.15; const rotateX = Math.sin(animationTime * 0.1) * 0.3;
            const cosY = Math.cos(rotateY), sinY = Math.sin(rotateY);
            const x1 = x * cosY - z * sinY; const z1 = x * sinY + z * cosY;
            const cosX = Math.cos(rotateX), sinX = Math.sin(rotateX);
            const y1 = y * cosX - z1 * sinX; const z2 = y * sinX + z1 * cosX;
            return { x: centerX + x1 * scale, y: centerY - y1 * scale, z: z2 };
        }

        // 绘制Lorenz吸引子
        function drawLorenzAttractor() {
            ctx.save();
            for (let i = 1; i < trail.length; i++) {
                const point = trail[i]; const prevPoint = trail[i - 1]; if (!point || !prevPoint) continue;
                const pos = project3D(point.x, point.y, point.z); const prevPos = project3D(prevPoint.x, prevPoint.y, prevPoint.z);
                const progress = i / trail.length; const alpha = 0.3 + progress * 0.7; const width = 0.5 + progress * 3.5; const brightness = 50 + progress * 30;
                ctx.strokeStyle = `rgba(0, ${brightness + 200}, 255, ${alpha})`;
                ctx.lineWidth = width; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                ctx.shadowBlur = width * 8; ctx.shadowColor = `rgba(0, 255, 255, ${alpha * 0.8})`;
                ctx.beginPath(); ctx.moveTo(prevPos.x, prevPos.y); ctx.lineTo(pos.x, pos.y); ctx.stroke();
            }

            // 当前点辉光
            if (trail.length > 0) {
                const currentPoint = trail[trail.length - 1]; const pos = project3D(currentPoint.x, currentPoint.y, currentPoint.z);
                const pulse = Math.sin(animationTime * 8) * 0.3 + 1.3;
                const gradient1 = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, 60 * pulse);
                gradient1.addColorStop(0, 'rgba(0, 255, 255, 0.8)');
                gradient1.addColorStop(0.3, 'rgba(0, 255, 255, 0.4)');
                gradient1.addColorStop(1, 'rgba(0, 255, 255, 0)');
                ctx.fillStyle = gradient1; ctx.beginPath(); ctx.arc(pos.x, pos.y, 60 * pulse, 0, Math.PI * 2); ctx.fill();

                const gradient2 = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, 30 * pulse);
                gradient2.addColorStop(0, 'rgba(255, 255, 255, 0.9)');
                gradient2.addColorStop(0.5, 'rgba(0, 255, 255, 0.6)');
                gradient2.addColorStop(1, 'rgba(0, 255, 255, 0)');
                ctx.fillStyle = gradient2; ctx.beginPath(); ctx.arc(pos.x, pos.y, 30 * pulse, 0, Math.PI * 2); ctx.fill();

                ctx.fillStyle = '#fff'; ctx.shadowBlur = 50; ctx.shadowColor = '#00ffff';
                ctx.beginPath(); ctx.arc(pos.x, pos.y, 8 * pulse, 0, Math.PI * 2); ctx.fill();
            }
            ctx.restore();
        }

        // 坐标轴与网格
        function drawAxes() {
            ctx.save();
            const axisLength = 80; const origin = project3D(0, 0, 0);
            const xPos = project3D(axisLength, 0, 0), xNeg = project3D(-axisLength, 0, 0);
            const yPos = project3D(0, axisLength, 0), yNeg = project3D(0, -axisLength, 0);
            const zPos = project3D(0, 0, axisLength), zNeg = project3D(0, 0, -axisLength);
            ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1.5; ctx.shadowBlur = 10; ctx.shadowColor = 'rgba(255,255,255,0.2)';
            ctx.beginPath(); ctx.moveTo(xNeg.x, xNeg.y); ctx.lineTo(xPos.x, xPos.y); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(yNeg.x, yNeg.y); ctx.lineTo(yPos.x, yPos.y); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(zNeg.x, zNeg.y); ctx.lineTo(zPos.x, zPos.y); ctx.stroke();

            const drawArrowAndLabel = (pos, angle, label, bright) => {
                ctx.save(); ctx.translate(pos.x, pos.y); ctx.rotate(angle);
                ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-10, -5); ctx.lineTo(-10, 5); ctx.closePath();
                ctx.fillStyle = `rgba(255, 255, 255, ${bright ? 0.4 : 0.25})`; ctx.shadowBlur = 8; ctx.shadowColor = 'rgba(255,255,255,0.2)'; ctx.fill(); ctx.restore();
                ctx.fillStyle = `rgba(255,255,255,${bright ? 0.6 : 0.4})`; ctx.font = 'bold 18px Arial'; ctx.shadowBlur = 10; ctx.shadowColor = 'rgba(255,255,255,0.3)';
                ctx.fillText(label, pos.x + 12, pos.y + 5);
            };
            drawArrowAndLabel(xPos, Math.atan2(xPos.y - origin.y, xPos.x - origin.x), '+X', true);
            drawArrowAndLabel(xNeg, Math.atan2(xNeg.y - origin.y, xNeg.x - origin.x), '-X', false);
            drawArrowAndLabel(yPos, Math.atan2(yPos.y - origin.y, yPos.x - origin.x), '+Y', true);
            drawArrowAndLabel(yNeg, Math.atan2(yNeg.y - origin.y, yNeg.x - origin.x), '-Y', false);
            drawArrowAndLabel(zPos, Math.atan2(zPos.y - origin.y, zPos.x - origin.x), '+Z', true);
            drawArrowAndLabel(zNeg, Math.atan2(zNeg.y - origin.y, zNeg.x - origin.x), '-Z', false);

            ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 0.8; ctx.shadowBlur = 3;
            for (let i = -4; i <= 4; i++) {
                if (i === 0) continue; const gridSize = 20;
                const p1 = project3D(i * gridSize, -80, 0); const p2 = project3D(i * gridSize, 80, 0);
                ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                const p3 = project3D(-80, i * gridSize, 0); const p4 = project3D(80, i * gridSize, 0);
                ctx.beginPath(); ctx.moveTo(p3.x, p3.y); ctx.lineTo(p4.x, p4.y); ctx.stroke();
            }
            ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.shadowBlur = 15; ctx.shadowColor = 'rgba(255,255,255,0.4)';
            ctx.beginPath(); ctx.arc(origin.x, origin.y, 5, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }

        function drawParticles() {
            if (trail.length < 100) return; ctx.save();
            const particleCount = 80;
            for (let i = 0; i < particleCount; i++) {
                const index = Math.floor((i / particleCount) * trail.length);
                const point = trail[index]; if (!point) continue;
                const pos = project3D(point.x, point.y, point.z);
                const sparkle = Math.sin(animationTime * 6 + i * 0.8) * 0.5 + 0.5;
                if (sparkle > 0.5) {
                    const progress = index / trail.length; const size = 2 + sparkle * 5; const alpha = sparkle * (0.5 + progress * 0.5); const brightness = 200 + progress * 55;
                    ctx.fillStyle = `rgba(0, ${brightness}, 255, ${alpha})`; ctx.shadowBlur = 25; ctx.shadowColor = `rgba(0, 255, 255, ${alpha * 0.8})`;
                    ctx.beginPath(); ctx.arc(pos.x, pos.y, size, 0, Math.PI * 2); ctx.fill();
                }
            }
            ctx.restore();
        }

        function animate() {
            try {
                drawBackground(); animationTime += 0.016;
                for (let i = 0; i < 3; i++) { const point = lorenzStep(); trail.push({ x: point.x, y: point.y, z: point.z }); if (trail.length > maxTrailLength) trail.shift(); }
                drawAxes(); drawLorenzAttractor(); drawParticles();
                requestAnimationFrame(animate);
            } catch (error) { console.error('Animation error:', error); requestAnimationFrame(animate); }
        }

        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        animate();

        // =========================
        // 人生哲理轮播系统（推荐版）
        const wisdoms = [
          "人生的轨迹，看似混乱，却自有方向。稳住心，就能穿越风暴。",
          "命运不是直线，而是一场绕行——但每一次弯，都有意义。",
          "真正的成熟，是接受不确定，并仍然向前。",
          "感情如流线，失控时学会不抗拒，静观其变。",
          "混沌并非崩坏，而是另一种秩序的重生。",
          "人生没有固定解法，只有不断调整参数的勇气。",
          "当你停止追求控制，反而掌握了节奏。",
          "每一次偏离，都是你新的轨迹正在生成。"
        ];

        const wisdomDiv = document.querySelector('.wisdom');

        // 根据可视宽度把文字尽量压到单行
        function fitWisdomToOneLine() {
            const padding = 80; // 与 .wisdom 左右 padding 对齐
            const maxWidth = window.innerWidth - padding;
            // 上限/下限字号（移动端更小）
            const base = window.innerWidth < 768 ? 20 : 24;
            const min = window.innerWidth < 768 ? 14 : 16;
            // 若CSS被外部改动，这里先回到基准
            let size = base;
            wisdomDiv.style.fontSize = size + 'px';
            // 如果超过宽度，逐步减小直至单行放下或到最小字号
            while (wisdomDiv.scrollWidth > maxWidth && size > min) {
                size -= 1;
                wisdomDiv.style.fontSize = size + 'px';
            }
        }
        // 初始化：随机从一条开始，更有“现场感”
        let wisdomIndex = Math.floor(Math.random() * wisdoms.length);
        wisdomDiv.style.opacity = 0;
        function setWisdomText(text) {
            // 重置为CSS默认字号后再适配，以避免字体被越调越小
            wisdomDiv.style.fontSize = '';
            wisdomDiv.textContent = text;
            fitWisdomToOneLine();
        }
        function fadeIn() { requestAnimationFrame(() => { wisdomDiv.style.opacity = 1; }); }
        function fadeOut(callback) { wisdomDiv.style.opacity = 0; setTimeout(callback, 1000); }

        // 首次进入：延时淡入，避免和画面加载抢镜
        setTimeout(() => { setWisdomText(wisdoms[wisdomIndex]); fadeIn(); }, 1200);

        function rotateWisdom() {
            fadeOut(() => {
                wisdomIndex = (wisdomIndex + 1) % wisdoms.length;
                setWisdomText(wisdoms[wisdomIndex]);
                fadeIn();
            });
        }
        // 每6秒切换一次
        setInterval(rotateWisdom, 6000);
        // 视口变化时也自适应单行
        window.addEventListener('resize', () => { fitWisdomToOneLine(); });
        
    </script>

</body>
</html>
